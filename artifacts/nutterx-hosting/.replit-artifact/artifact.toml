kind = "web"
previewPath = "/"
title = "Nutterx Hosting"
version = "1.0.0"
id = "artifacts/nutterx-hosting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25013

[services.development]
run = "pnpm --filter @workspace/nutterx-hosting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutterx-hosting", "run", "build" ]
publicDir = "artifacts/nutterx-hosting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25013"
BASE_PATH = "/"
